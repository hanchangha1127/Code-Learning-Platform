<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>프로필 - 코드 학습 플랫폼</title>
  <link rel="stylesheet" href="/static/shared/css/base.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/shared/css/app.css" />
  <link rel="stylesheet" href="/static/shared/css/whiteboard-theme.css" />
  <link rel="stylesheet" href="/static/mobile/css/app.css" />
</head>
<body data-template-variant="mobile">
  <section id="profile-section" class="app">
    <header class="app-header page-header">
      <div>
        <p class="eyebrow">계정과 학습 설정</p>
        <h1>프로필</h1>
        <p class="header-status">설정, 오답 노트, 학습 리포트를 한 화면에서 관리합니다.</p>
      </div>
      <div class="header-actions">
        <a href="/dashboard.html" class="ghost">대시보드</a>
      </div>
    </header>

    <main class="profile-grid">
      <section class="panel profile-summary">
        <div class="profile-identity">
          <div id="profile-avatar" class="profile-avatar" aria-hidden="true">학</div>
          <div class="profile-identity-text">
            <h2 id="profile-name">사용자</h2>
            <span id="profile-tier" class="pill">티어: -</span>
            <p class="panel-description">저장된 설정을 기준으로 모든 모드가 동작합니다.</p>
          </div>
        </div>
        <button id="btn-wrong-note" class="profile-action" type="button">오답 노트 열기</button>
        <button id="btn-report" class="profile-action" type="button">학습 리포트 보기</button>
        <button id="btn-logout" class="profile-logout" type="button">로그아웃</button>
      </section>

      <section class="panel profile-settings-panel">
        <div class="panel-group">
          <p class="panel-note">공통 설정</p>
          <h3>학습 설정</h3>
          <p class="panel-description">여기서 저장한 값은 모든 학습 모드에 공통으로 반영됩니다.</p>
        </div>
        <div class="panel-group">
          <h4>문제 언어</h4>
          <div id="language-setting" class="pill-group"></div>
        </div>
        <div class="panel-group">
          <h4>문제 난이도</h4>
          <div id="difficulty-setting" class="pill-group"></div>
        </div>
      </section>
    </main>
  </section>

  <div id="toast" class="toast hidden" role="status" aria-live="assertive"></div>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-card">
      <button id="modal-close" type="button" class="ghost close-btn" aria-label="닫기">&times;</button>
      <h3 id="modal-title"></h3>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="/static/shared/js/auth_client.js"></script>
  <script src="/static/shared/js/api_client.js"></script>
  <script src="/static/shared/js/profile.js" type="module"></script>
</body>
</html>
