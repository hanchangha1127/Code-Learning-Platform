<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>코드 오류 - 코드 학습 플랫폼</title>
  <link rel="stylesheet" href="/static/styles.css?v=20260301-2" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <section id="code-error-section" class="app">
    <header class="app-header">
      <div>
        <h1>코드 오류</h1>
        <p class="header-status">블록 중 단 하나의 오류를 찾아보세요.</p>
      </div>
      <div class="header-actions">
        <a href="/dashboard.html" class="ghost">대시보드</a>
        <span id="cerr-user-display" class="user-chip"></span>
      </div>
    </header>

    <main class="workspace cerr-wrapper">
      <aside class="panel cerr-controls">
        <h3>언어 설정</h3>
        <p class="panel-description">내 정보에서 설정한 언어로 문제를 출제합니다.</p>
        <div class="pill-group">
          <span id="cerr-language-display" class="pill">언어 -</span>
          <span id="cerr-difficulty-display" class="pill">난이도 -</span>
        </div>
        <a class="ghost block" href="/profile.html">내 정보에서 변경</a>
        <button id="cerr-load-btn" class="primary block" type="button" disabled>문제 받기</button>
        <p id="cerr-status" class="panel-description">내 정보에서 언어를 설정한 뒤 시작하세요.</p>
      </aside>

      <section class="panel cerr-board">
        <header class="cerr-header">
          <div>
            <h2 id="cerr-title">문제를 불러와 주세요.</h2>
          </div>
          <div class="cerr-actions">
            <button id="cerr-submit-btn" class="primary" type="button" disabled>정답 확인</button>
            <button id="cerr-next-btn" class="ghost" type="button" disabled>다음 문제</button>
          </div>
        </header>

        <div id="cerr-blocks" class="cerr-blocks" aria-live="polite">
          <p class="empty">문제를 불러오면 블록이 표시됩니다.</p>
        </div>

        <div id="cerr-feedback" class="cerr-feedback hidden">
          <p id="cerr-feedback-text"></p>
          <div id="cerr-explanation-box" class="cerr-explanation hidden">
            <h4>설명</h4>
            <p id="cerr-explanation" class="panel-description"></p>
          </div>
        </div>
      </section>
    </main>
  </section>

  <script src="/static/auth_client.js?v=20260209-1"></script>
  <script src="/static/api_client.js?v=20260221-1"></script>
  <script src="/static/codeerror.js?v=20260201-2" type="module"></script>
</body>
</html>
