<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>코드 배치 - 코드 학습 플랫폼</title>
  <link rel="stylesheet" href="/static/styles.css?v=20260301-2" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <section id="arrange-section" class="app">
    <header class="app-header">
      <div>
        <h1>코드 배치</h1>
        <p class="header-status">뒤섞인 코드 블록을 올바른 순서로 재배열하세요.</p>
      </div>
      <div class="header-actions">
        <a href="/dashboard.html" class="ghost">대시보드</a>
        <span id="arr-user" class="user-chip"></span>
      </div>
    </header>

    <main class="workspace arrange-wrapper">
      <aside class="panel arrange-controls">
        <h3>언어 설정</h3>
        <p class="panel-description">내 정보에서 설정한 언어로 문제를 출제합니다.</p>
        <div class="pill-group">
          <span id="arr-language-display" class="pill">언어 -</span>
          <span id="arr-difficulty-display" class="pill">난이도 -</span>
        </div>
        <a class="ghost block" href="/profile.html">내 정보에서 변경</a>
        <button id="arr-load-btn" class="primary block" type="button" disabled>문제 받기</button>
        <p id="arr-status" class="panel-description">내 정보에서 언어를 설정한 뒤 시작하세요.</p>
      </aside>

      <section class="panel arrange-board">
        <header class="arrange-header">
          <div>
            <p class="badge soft">드래그 앤 드롭</p>
            <h2 id="arr-title">문제를 불러와 주세요.</h2>
          </div>
          <div class="arrange-actions">
            <button id="arr-check-btn" class="ghost" type="button" disabled>정답 확인</button>
            <button id="arr-next-btn" class="primary" type="button" disabled>다음 문제</button>
          </div>
        </header>

        <div class="arrange-instruction">
          <p>블록을 끌어서 순서를 맞추세요. 정답 확인 시 맞은 블록은 초록색, 틀린 블록은 붉은색 테두리로 표시됩니다.</p>
        </div>

        <div id="arr-blocks" class="arrange-blocks" aria-live="polite">
          <p class="empty">문제를 불러오면 여기에서 블록을 재배열할 수 있습니다.</p>
        </div>

        <div id="arr-feedback" class="arrange-feedback hidden">
          <p id="arr-feedback-text"></p>
          <div id="arr-answer" class="arrange-answer hidden">
            <h4>정답 코드</h4>
            <pre id="arr-answer-code" class="code-block"></pre>
          </div>
        </div>
      </section>
    </main>
  </section>

  <script src="/static/auth_client.js?v=20260209-1"></script>
  <script src="/static/api_client.js?v=20260221-1"></script>
  <script src="/static/arrange.js?v=20260201-2" type="module"></script>
</body>
</html>
