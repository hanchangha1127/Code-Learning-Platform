<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>코드 학습 플랫폼 - 로그인</title>
  <link rel="stylesheet" href="/static/styles.css?v=20260301-2" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <section class="auth-view">
    <div class="hero-card card">
      <p class="eyebrow">모바일 최적화 · 베타</p>
      <h1>AI와 함께하는 코드 설명 학습</h1>
      <p class="auth-tagline">
        언어와 난이도를 고르면 맞춤 알고리즘 문제를 받고, AI 피드백으로 학습 과정을 투명하게 확인하세요.
      </p>
      <ul class="hero-checklist">
        <li>강점 · 개선 포인트 자동 분류</li>
        <li>언어/난이도 조합에 맞춘 문제 추천</li>
        <li>학습 리포트로 성장 추적</li>
      </ul>
    </div>

    <main class="auth-main card">
      <header class="auth-card-header">
        <h2>맞춤 학습 허브</h2>
        <p>AI와 함께 코드 설명력을 길러보세요.</p>
      </header>

      <div class="auth-form">
        <button type="button" id="google-login" class="primary auth-submit block">Google로 로그인</button>
        <form id="guest-login-form" class="auth-action" action="/api/auth/guest/start" method="get">
          <button
            type="submit"
            id="guest-login"
            class="primary auth-submit block"
            style="--primary:#74c3ff; --primary-dark:#5ab6fb;"
          >게스트로 시작</button>
        </form>
        <p class="auth-hint">Google 계정으로 바로 시작할 수 있어요.</p>
        <p class="auth-hint">게스트 기록은 일정 시간이 지나면 자동으로 삭제됩니다.</p>
      </div>

      <p id="auth-message" class="auth-message" role="status" aria-live="polite"></p>
    </main>
  </section>

  <script src="/static/auth_client.js?v=20260209-1"></script>
  <script src="/static/login.js?v=20260201-2" type="module"></script>
</body>
</html>
