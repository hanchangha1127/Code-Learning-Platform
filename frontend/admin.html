<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 패널</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/admin.css?v=20260221-1" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
  <script src="/static/admin.js?v=20260221-1" type="module" defer></script>
</head>
<body>
  <main class="admin-shell">
    <header class="topbar">
      <div class="brand">
        <h1>코드 플랫폼 관리자 패널</h1>
        <p>실시간 접속 현황과 AI 사용량을 모니터링합니다.</p>
      </div>
      <div class="actions">
        <span id="last-updated" class="pill">마지막 갱신: -</span>
        <button id="refresh-btn" class="btn btn-refresh" type="button">지금 새로고침</button>
        <button id="shutdown-btn" class="btn btn-stop" type="button">스택 안전 종료</button>
      </div>
    </header>

    <section class="grid" aria-live="polite">
      <article class="card stat-card">
        <h2>활성 사용자</h2>
        <div id="active-users" class="value">0</div>
        <p class="hint">최근 윈도우 내 인증 사용자 수</p>
      </article>

      <article class="card stat-card">
        <h2>활성 클라이언트</h2>
        <div id="active-clients" class="value">0</div>
        <p class="hint">최근 윈도우 내 고유 클라이언트 수</p>
      </article>

      <article class="card stat-card">
        <h2>처리 중 요청</h2>
        <div id="inflight-requests" class="value">0</div>
        <p class="hint">현재 서버가 처리 중인 HTTP 요청</p>
      </article>

      <article class="card stat-card">
        <h2>AI 성공률</h2>
        <div id="ai-success-rate" class="value">0%</div>
        <p id="ai-summary" class="hint">AI 요청 데이터가 없습니다.</p>
      </article>

      <article class="card chart-card">
        <h3>접속자 추이</h3>
        <div class="chart-wrap"><canvas id="users-chart"></canvas></div>
      </article>

      <article class="card chart-card">
        <h3>분당 AI 사용량</h3>
        <div class="chart-wrap"><canvas id="ai-usage-chart"></canvas></div>
      </article>

      <article class="card chart-card">
        <h3>AI 평균 지연 시간 (ms)</h3>
        <div class="chart-wrap"><canvas id="ai-latency-chart"></canvas></div>
      </article>

      <article class="card chart-card">
        <h3>요청량 및 오류 추이</h3>
        <div class="chart-wrap"><canvas id="request-chart"></canvas></div>
      </article>
    </section>

    <section id="status-box" class="status-row">
      <strong>상태:</strong>
      <span id="status-text">첫 메트릭 응답을 기다리는 중...</span>
    </section>
  </main>
</body>
</html>
