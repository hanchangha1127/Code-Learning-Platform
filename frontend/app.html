<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>코드 학습 플랫폼 - 페이지 이동</title>
  <meta http-equiv="refresh" content="0; url=/dashboard.html" />
  <link rel="stylesheet" href="/static/styles.css?v=20260301-2" />
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
  <div class="card" style="max-width:480px;text-align:center;">
    <h1 style="margin-bottom:12px;">페이지가 분리되었습니다</h1>
    <p style="margin-bottom:16px;">
      대시보드, 코드 분석, 코드 블록 화면이 각각 별도 HTML로 분리되었습니다.
      잠시 후 <strong>대시보드</strong>로 이동합니다.
    </p>
    <a class="primary" href="/dashboard.html">대시보드 바로가기</a>
  </div>
  <script>
    // JS 안전망: 메타 리프레시가 동작하지 않을 때를 대비
    setTimeout(() => {
      if (window.location.pathname.endsWith("/app.html")) {
        window.location.replace("/dashboard.html");
      }
    }, 100);
  </script>
</body>
</html>
