<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>코드 계산 - 코드 학습 플랫폼</title>
  <link rel="stylesheet" href="/static/styles.css?v=20260301-2" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <section id="code-calc-section" class="app">
    <header class="app-header">
      <div>
        <h1>코드 계산</h1>
        <p class="header-status">코드를 실행하지 않고 최종 출력값을 맞혀보세요.</p>
      </div>
      <div class="header-actions">
        <a href="/dashboard.html" class="ghost">대시보드</a>
        <span id="calc-user-display" class="user-chip"></span>
      </div>
    </header>

    <main class="workspace calc-wrapper">
      <aside class="panel calc-controls">
        <h3>언어 설정</h3>
        <p class="panel-description">내 정보에서 설정한 언어로 문제를 출제합니다.</p>
        <div class="pill-group">
          <span id="calc-language-display" class="pill">언어 -</span>
          <span id="calc-difficulty-display" class="pill">난이도 -</span>
        </div>
        <a class="ghost block" href="/profile.html">내 정보에서 변경</a>
        <button id="calc-load-btn" class="primary block" type="button" disabled>문제 받기</button>
        <p id="calc-status" class="panel-description">내 정보에서 언어를 설정한 뒤 시작하세요.</p>
      </aside>

      <section class="panel calc-board">
        <header class="calc-header">
          <div>
            <h2 id="calc-title">문제를 불러와 주세요.</h2>
          </div>
          <div class="calc-actions">
            <button id="calc-submit-btn" class="primary" type="button" disabled>정답 확인</button>
            <button id="calc-next-btn" class="ghost" type="button" disabled>다음 문제</button>
          </div>
        </header>

        <div class="calc-code">
          <pre id="calc-code-display" class="code-block">// 문제를 불러오면 코드가 표시됩니다.</pre>
        </div>

        <div class="calc-input">
          <label for="calc-output">예상 출력값</label>
          <textarea id="calc-output" class="calc-output-field" rows="3" autocomplete="off" placeholder="실행 없이 머릿속으로 출력값을 계산해 입력하세요." disabled></textarea>
        </div>

        <div id="calc-feedback" class="calc-feedback hidden" aria-live="polite">
          <p id="calc-feedback-text"></p>
          <div id="calc-expected" class="calc-expected hidden">
            <h4>정답 출력</h4>
            <pre id="calc-expected-output" class="code-block"></pre>
            <p id="calc-explanation" class="panel-description"></p>
          </div>
        </div>
      </section>
    </main>
  </section>

  <script src="/static/auth_client.js?v=20260209-1"></script>
  <script src="/static/api_client.js?v=20260221-1"></script>
  <script src="/static/codecalc.js?v=20260201-2" type="module"></script>
</body>
</html>
