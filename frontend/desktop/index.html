<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>코드 학습 플랫폼 - 로그인</title>
  <link rel="stylesheet" href="/static/shared/css/base.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/shared/css/app.css" />
  <link rel="stylesheet" href="/static/shared/css/whiteboard-theme.css" />
  <link rel="stylesheet" href="/static/desktop/css/app.css" />
</head>
<body data-template-variant="desktop">
  <section class="auth-view" aria-live="polite">
    <div class="auth-shell">
      <main class="card auth-panel">
        <header class="auth-card-header">
          <p class="eyebrow">빠른 시작</p>
          <h2 class="auth-panel-title">로그인하고 바로 시작하세요.</h2>
        </header>

        <div class="auth-panel-actions">
          <button type="button" id="google-login" class="primary block">Google로 로그인</button>
          <form id="guest-login-form" class="auth-action" action="/platform/auth/guest" method="post">
            <button type="submit" id="guest-login" class="ghost block">게스트로 시작</button>
          </form>
        </div>

        <p id="auth-message" class="auth-message" role="status" aria-live="polite"></p>
      </main>
    </div>
  </section>

  <script src="/static/shared/js/auth_client.js"></script>
  <script src="/static/shared/js/login.js" type="module"></script>
</body>
</html>
