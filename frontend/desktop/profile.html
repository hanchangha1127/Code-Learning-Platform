<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>프로필 - 코드 학습 플랫폼</title>
  <link rel="stylesheet" href="/static/shared/css/base.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/shared/css/app.css" />
  <link rel="stylesheet" href="/static/shared/css/whiteboard-theme.css" />
  <link rel="stylesheet" href="/static/desktop/css/app.css" />
</head>
<body data-template-variant="desktop">
  <section id="profile-section" class="app">
    <header class="app-header page-header">
      <div>
        <p class="eyebrow">계정과 학습 설정</p>
        <h1>프로필</h1>
        <p class="header-status">언어, 난이도, 오답 노트와 리포트를 한 곳에서 관리하세요.</p>
      </div>
      <div class="header-actions">
        <a href="/dashboard.html" class="ghost">대시보드</a>
      </div>
    </header>

    <main class="profile-grid">
      <aside class="panel profile-summary">
        <div class="panel-group">
          <p class="panel-note">학습자 카드</p>
          <div class="profile-identity">
            <div id="profile-avatar" class="profile-avatar" aria-hidden="true">학</div>
            <div class="profile-identity-text">
              <h2 id="profile-name">사용자</h2>
          <span id="profile-tier" class="pill">레벨 -</span>
              <p class="panel-description">저장된 설정과 현재 학습 상태를 기준으로 모든 모드가 동작합니다.</p>
            </div>
          </div>
        </div>

        <div class="panel-group">
          <button id="btn-wrong-note" class="profile-action" type="button">
            <div class="profile-action-header"><span>오답 노트</span><span class="profile-action-arrow">›</span></div>
            <span class="profile-action-desc">틀린 문제와 해설, 제출 기록을 모아서 다시 확인합니다.</span>
          </button>
          <button id="btn-report" class="profile-action" type="button">
            <div class="profile-action-header"><span>학습 리포트</span><span class="profile-action-arrow">›</span></div>
            <span class="profile-action-desc">최근 학습 흐름을 정리한 AI 솔루션 리포트를 확인합니다.</span>
          </button>
          <section id="latest-report-card" class="profile-report-card" aria-live="polite">
            <div class="profile-report-copy">
              <p class="panel-note">최근 학습 리포트</p>
              <strong id="latest-report-title">아직 저장된 리포트가 없습니다.</strong>
              <p id="latest-report-meta" class="profile-action-desc">학습 리포트를 생성하면 여기서 다시 PDF로 내려받을 수 있습니다.</p>
            </div>
            <button id="btn-latest-report-download" type="button" class="ghost" disabled>최근 PDF 다운로드</button>
          </section>
          <button id="btn-logout" class="profile-logout" type="button">로그아웃</button>
        </div>
      </aside>

      <section class="panel profile-settings-panel">
        <div class="panel-group">
          <p class="panel-note">공통 설정</p>
          <h3>학습 설정</h3>
          <p class="panel-description">여기서 저장한 값은 모든 학습 모드에 공통으로 반영됩니다.</p>
        </div>
        <div class="panel-group">
          <h4>문제 언어</h4>
          <div id="language-setting" class="setting-select"></div>
        </div>
        <div class="panel-group">
          <h4>문제 난이도</h4>
          <div id="difficulty-setting" class="pill-group"></div>
        </div>
      </section>
    </main>
  </section>

  <div id="toast" class="toast hidden" role="status" aria-live="assertive"></div>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-card">
      <button id="modal-close" type="button" class="ghost close-btn" aria-label="닫기">&times;</button>
      <h3 id="modal-title"></h3>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="/static/shared/js/auth_client.js"></script>
  <script src="/static/shared/js/api_client.js"></script>
  <script src="/static/shared/js/profile.js" type="module"></script>
</body>
</html>
