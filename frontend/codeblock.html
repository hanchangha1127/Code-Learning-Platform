<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>코드 블록 - 코드 학습 플랫폼</title>
  <link rel="stylesheet" href="/static/styles.css?v=20260301-2" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <section id="code-block-section" class="app">
    <header class="app-header">
      <div>
        <h1>코드 블록</h1>
        <p class="header-status">빈칸을 채우고 정답을 골라보세요.</p>
      </div>
      <div class="header-actions">
        <a href="/dashboard.html" class="ghost">대시보드</a>
        <span id="cb-user-display" class="user-chip"></span>
      </div>
    </header>

    <main class="workspace">
      <div class="cb-wrapper">
        <div class="panel cb-problem-area">
          <div class="panel-group">
            <h3>언어 설정</h3>
            <p class="panel-description">내 정보에서 설정한 언어로 문제를 출제합니다.</p>
            <div class="pill-group">
              <span id="cb-language-display" class="pill">언어 -</span>
              <span id="cb-difficulty-display" class="pill">난이도 -</span>
            </div>
            <a class="ghost block" href="/profile.html">내 정보에서 변경</a>
            <button id="cb-load-btn" class="primary block" type="button" disabled>문제 받기</button>
          </div>

          <div class="cb-header">
            <div class="cb-title-group">
              <h2 class="cb-problem-title" id="cb-problem-title">문제를 불러오는 중...</h2>
            </div>
          </div>

          <div class="code-window">
            <div class="window-header">
              <span class="dot red"></span>
              <span class="dot yellow"></span>
              <span class="dot green"></span>
            </div>
            <pre><code id="cb-code-display" class="language-python"># 문제를 불러오는 중입니다...</code></pre>
          </div>

          <div class="cb-options" id="cb-options-container">
            <!-- Options injected by JS -->
          </div>

          <div id="cb-feedback-area" class="hidden">
            <div class="cb-result-message" id="cb-result-message"></div>
            <p id="cb-explanation" class="cb-explanation"></p>
            <button class="primary block" type="button" onclick="app.loadCodeBlockProblem()">다음 문제</button>
          </div>
        </div>
      </div>
    </main>
  </section>

  <script src="/static/auth_client.js?v=20260209-1"></script>
  <script src="/static/api_client.js?v=20260221-1"></script>
  <script src="/static/codeblock.js?v=20260301-1" type="module"></script>
</body>
</html>
