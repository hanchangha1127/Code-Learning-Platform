services:
  mysql:
    image: mysql:8.0
    container_name: code-platform-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD is required}"
      MYSQL_DATABASE: "${DB_NAME:-code_platform}"
      MYSQL_USER: "${DB_USER:-appuser}"
      MYSQL_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD is required}"
      TZ: Asia/Seoul
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    container_name: code-platform-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  api:
    build: .
    container_name: code-platform-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: "${DB_NAME:-code_platform}"
      DB_USER: "${DB_USER:-appuser}"
      DB_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD is required}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      ANALYSIS_QUEUE_MODE: rq
      ANALYSIS_QUEUE_NAME: analysis
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required}"
      JWT_ALG: HS256
      ACCESS_TOKEN_EXPIRES_MIN: 30
      REFRESH_TOKEN_EXPIRES_DAYS: 14
      AI_PROVIDER: "${AI_PROVIDER:-mock}"
      GOOGLE_API_KEY: "${GOOGLE_API_KEY:-}"
      AI_API_KEY: "${AI_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o-mini}"
      GOOGLE_API_KEY_FILE: "${GOOGLE_API_KEY_FILE:-}"
      AI_API_KEY_FILE: "${AI_API_KEY_FILE:-}"
      ENABLE_HTTPS: "${ENABLE_HTTPS:-false}"
      HTTPS_BIND_PORT: "${HTTPS_BIND_PORT:-8443}"
      HTTPS_PUBLIC_PORT: "${HTTPS_PUBLIC_PORT:-443}"
      HTTP_REDIRECT_PORT: "${HTTP_REDIRECT_PORT:-8000}"
      TLS_CERTS_DIR: "/certs"
      SSL_CERTFILE: "${SSL_CERTFILE:-}"
      SSL_KEYFILE: "${SSL_KEYFILE:-}"
      TZ: Asia/Seoul
      UVICORN_WORKERS: 1
    volumes:
      - ${TLS_CERTS_DIR:-./certs}:/certs:ro
  worker:
    build: .
    container_name: code-platform-worker
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: "${DB_NAME:-code_platform}"
      DB_USER: "${DB_USER:-appuser}"
      DB_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD is required}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      ANALYSIS_QUEUE_MODE: rq
      ANALYSIS_QUEUE_NAME: analysis
      AI_PROVIDER: "${AI_PROVIDER:-mock}"
      AI_API_KEY: "${AI_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o-mini}"
      TZ: Asia/Seoul
    entrypoint: ["python", "-m", "app.worker"]

volumes:
  mysql_data:
  redis_data:

